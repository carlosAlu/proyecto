services:
  frontend:
    image: nginx:alpine
    container_name: ironclad_frontend
    ports:
      - "${FRONTEND_PORT}:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - gateway

  gateway:
    build: ./gateway
    container_name: ironclad_gateway
    ports:
      - "${GATEWAY_PORT}:3000"
    environment:
      MONGO_URI: ${MONGO_URI}
      DB_NAME: ${DB_NAME}
    depends_on:
      - service_inventario
      - service_auth
      - mongo1

  mongo1:
    image: mongo:7
    container_name: mongo1
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongo1_data:/data/db

  mongo_arbiter:
    image: mongo:7
    container_name: mongo_arbiter
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27018:27017"
    volumes:
      - mongo_arbiter_data:/data/db

  service_auth:
    build: ./service_auth
    container_name: service_auth
    ports:
      - "${AUTH_PORT}:3001"
    environment:
      MONGO_URI: ${MONGO_URI}
      DB_NAME: ${DB_NAME}
      PORT: 3001
    depends_on:
      - mongo1

  service_inventario:
    build: ./service_inventario
    container_name: service_inventario
    ports:
      - "${INVENTARIO_PORT}:3002"
    environment:
      MONGO_URI: ${MONGO_URI}
      DB_NAME: ${DB_NAME}
      PORT: 3002
    depends_on:
      - mongo1
  
  service_transactions:
    build: ./service_transactions
    container_name: service_transactions
    ports:
      - "${TRANSACCIONES_PORT}:3004"
    environment:
      MONGO_URI: ${MONGO_URI}
      DB_NAME: ${DB_NAME}
      PORT: 3004

volumes:
  mongo1_data:
  mongo_arbiter_data: