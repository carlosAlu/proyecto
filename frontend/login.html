<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - Sistema de Inventario</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
    <div class="w-full max-w-md">
      <div class="bg-white rounded-2xl shadow-xl p-8">
        
        <!-- Logo -->
        <div class="flex justify-center mb-6">
          <div class="bg-blue-600 p-3 rounded-xl">
            <i data-lucide="package" class="w-8 h-8 text-white"></i>
          </div>
        </div>

        <h1 class="text-3xl text-center font-medium text-gray-900 mb-2">Sistema de Inventario</h1>
        <p class="text-center text-gray-600 mb-8">Inicia sesión para continuar</p>

        <!-- Formulario -->
        <form id="login-form" class="space-y-6">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              Correo Electrónico
            </label>
            <input
              type="email"
              id="email"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
              placeholder="correo@ejemplo.com"
              required
            />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              Contraseña
            </label>
            <input
              type="password"
              id="password"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
              placeholder="••••••••"
              required
            />
          </div>

          <!-- Mensaje de Error (Oculto por defecto) -->
          <div id="error-message" class="hidden bg-red-50 text-red-600 px-4 py-3 rounded-lg text-sm font-medium">
            Credenciales incorrectas
          </div>

          <!-- Botón de Submit -->
          <button
            type="submit"
            id="submit-btn"
            class="w-full bg-blue-600 text-white font-medium py-3 rounded-lg hover:bg-blue-700 transition flex items-center justify-center gap-2"
          >
            <!-- Contenido normal del botón -->
            <div id="btn-content" class="flex items-center gap-2">
              <i data-lucide="log-in" class="w-5 h-5"></i>
              <span>Iniciar Sesión</span>
            </div>
            
            <!-- Spinner (Oculto por defecto) -->
            <div id="btn-spinner" class="hidden animate-spin rounded-full h-5 w-5 border-b-2 border-white"></div>
          </button>
        </form>


      </div>
    </div>
  </div>

  <script src="config/rutas_config.js"></script>
  <script src="assets/js/script_login.js"></script>

</body>
</html>
