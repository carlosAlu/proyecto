<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Dashboard</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-gray-50 min-h-screen">

    <div class="flex min-h-screen">

    <!-- sidebar -->    
    <div id="sidebar-container"></div>

    <!-- CONTENIDO -->
    <main class="flex-1 p-4 lg:p-8">

      <div class="max-w-7xl mx-auto space-y-8">

        <!-- Header -->
        <div>

          <h1 class="text-3xl font-bold text-gray-900 mb-2">
            Dashboard
          </h1>

          <p class="text-gray-600">
            Resumen general del sistema de inventario
          </p>

        </div>

        <!-- Stats -->
        <div
          id="stats-container"
          class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"
        ></div>

        <!-- Secciones -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

          <!-- Actividad -->
          <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">

            <h2 class="text-xl font-semibold text-gray-900 mb-4">
              Actividad Reciente
            </h2>

            <div
              id="activity-container"
              class="space-y-4"
            ></div>

          </div>

          <!-- Stock Bajo -->
          <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">

            <div class="flex items-center justify-between mb-4">

              <h2 class="text-xl font-semibold text-gray-900">
                Productos con Stock Bajo
              </h2>

              <span
                id="alerts-count"
                class="bg-orange-100 text-orange-600 text-xs px-3 py-1 rounded-full"
              >
              </span>

            </div>

            <div
              id="low-stock-container"
              class="space-y-3"
            ></div>

          </div>

        </div>

      </div>

    </main>

  </div>
  
  <script src="config/rutas_config.js"></script>
  <script src="assets/js/components.js?v=5"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/script_dashboard.js"></script>

</body>
</html>
