<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Perfil - Sistema de Inventario</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-gray-50 min-h-screen">
<div class="flex min-h-screen">

  <!-- sidebar -->    
    <div id="sidebar-container"></div>

  <main class="flex-1 p-4 lg:p-8">
    <div class="max-w-4xl mx-auto space-y-6">

      <div>
        <h1 class="text-3xl font-bold text-gray-900 mb-1">Mi Perfil</h1>
        <p class="text-gray-500">Gestiona tu información personal y configuración de acceso.</p>
      </div>

      <div id="alert-box" class="hidden items-center gap-3 p-4 rounded-lg border text-sm font-medium"></div>

      <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="bg-gradient-to-r from-blue-500 to-blue-700 h-24 relative">
          <div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(circle at 20% 50%, white 1px, transparent 1px); background-size: 24px 24px;"></div>
        </div>
        <div class="px-6 pb-6">
          <div class="flex flex-col sm:flex-row items-center sm:items-end gap-4 -mt-12 mb-6">

            <div class="relative flex-shrink-0">
              <div class="w-28 h-28 bg-white rounded-full border-4 border-white shadow-md flex items-center justify-center">
                <span id="avatar-initial" class="text-4xl font-bold text-blue-600">U</span>
              </div>
              <button class="absolute bottom-1 right-1 w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white hover:bg-blue-700 transition shadow">
                <i data-lucide="camera" class="w-4 h-4"></i>
              </button>
            </div>

            <div class="flex-1 text-center sm:text-left pb-1">
              <h2 id="display-name" class="mt-14 text-2xl font-bold text-gray-900 leading-tight">Nombre Usuario</h2>
              <p id="display-email" class="text-gray-500 text-sm mt-0.5">usuario@ejemplo.com</p>
              <span id="role-badge" class="inline-flex items-center gap-1.5 mt-2 px-2.5 py-1 bg-purple-50 text-purple-700 text-xs font-semibold rounded-full">
                <i data-lucide="shield" class="w-3 h-3"></i>
                <span id="display-role">Administrador</span>
              </span>
            </div>
          </div>

          <div class="grid grid-cols-3 gap-4 pt-5 border-t border-gray-100">
            <div class="bg-blue-50 rounded-xl p-4 text-center">
              <div class="flex items-center justify-center mb-2">
                <i data-lucide="zap" class="w-4 h-4 text-blue-400"></i>
              </div>
              <p class="text-2xl font-bold text-blue-600 mb-0.5">245</p>
              <p class="text-xs font-medium text-gray-500">Acciones realizadas</p>
            </div>
            <div class="bg-green-50 rounded-xl p-4 text-center">
              <div class="flex items-center justify-center mb-2">
                <i data-lucide="target" class="w-4 h-4 text-green-400"></i>
              </div>
              <p class="text-2xl font-bold text-green-600 mb-0.5">98%</p>
              <p class="text-xs font-medium text-gray-500">Tasa de precisión</p>
            </div>
            <div class="bg-purple-50 rounded-xl p-4 text-center">
              <div class="flex items-center justify-center mb-2">
                <i data-lucide="calendar" class="w-4 h-4 text-purple-400"></i>
              </div>
              <p class="text-2xl font-bold text-purple-600 mb-0.5">3m</p>
              <p class="text-xs font-medium text-gray-500">Tiempo activo</p>
            </div>
          </div>
        </div>
      </div>

     <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-medium text-gray-900">Información Personal</h2>
        <button
          type="button"
          id="toggle-edit-btn"
          class="text-blue-600 font-medium hover:text-blue-700 text-sm"
        >
          Editar
        </button>
      </div>

      <form id="personal-info-form" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              <div class="flex items-center gap-2 mb-2">
                <i data-lucide="user" class="w-4 h-4"></i>
                <span>Nombre Completo</span>
              </div>
            </label>
            <input
              type="text"
              id="input-name"
              disabled
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none disabled:bg-gray-50 disabled:text-gray-600 transition"
            />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              <div class="flex items-center gap-2 mb-2">
                <i data-lucide="mail" class="w-4 h-4"></i>
                <span>Correo Electrónico</span>
              </div>
            </label>
            <input
              type="email"
              id="input-email"
              disabled
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none disabled:bg-gray-50 disabled:text-gray-600 transition"
            />
          </div>
        </div>

        <div id="save-info-container" class="hidden pt-4 border-t border-gray-200">
          <button
            type="submit"
            class="bg-blue-600 text-white font-medium px-6 py-2 rounded-lg hover:bg-blue-700 transition flex items-center gap-2"
          >
            <i data-lucide="save" class="w-5 h-5"></i>
            <span>Guardar Cambios</span>
          </button>
        </div>
      </form>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
      <h2 class="text-xl font-medium text-gray-900 mb-6">Cambiar Contraseña</h2>
      <form id="password-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            <div class="flex items-center gap-2 mb-2">
              <i data-lucide="lock" class="w-4 h-4"></i>
              <span>Contraseña Actual</span>
            </div>
          </label>
          <input
            type="password"
            id="input-current-password"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
            placeholder="••••••••"
            required
          />
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Nueva Contraseña</label>
            <input
              type="password"
              id="input-new-password"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
              placeholder="••••••••"
              required
            />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Confirmar Contraseña</label>
            <input
              type="password"
              id="input-confirm-password"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
              placeholder="••••••••"
              required
            />
          </div>
        </div>

        <div class="pt-4">
          <button
            type="submit"
            class="bg-blue-600 text-white font-medium px-6 py-2 rounded-lg hover:bg-blue-700 transition flex items-center gap-2"
          >
            <i data-lucide="lock" class="w-5 h-5"></i>
            <span>Actualizar Contraseña</span>
          </button>
        </div>
      </form>
    </div>
  </main>
</div>

  <script src="assets/js/components.js?v=5"></script>
  <script src="assets/js/script_perfil.js"></script>
  <script src="assets/js/auth.js"></script>

</body>
</html>
