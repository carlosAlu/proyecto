<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Inventario</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-gray-50 min-h-screen">

  <div class="flex min-h-screen">

    <!-- sidebar -->    
    <div id="sidebar-container"></div>

    <!-- CONTENIDO -->
    <main class="flex-1">

      <div class="p-4 lg:p-8 max-w-7xl mx-auto space-y-6">

        <!-- Header -->
        <div class="flex items-center justify-between">

          <div>
            <h1 class="text-3xl font-semibold text-gray-900 mb-2">
              Inventario
            </h1>

            <p class="text-gray-600">
              Gestiona tus productos y stock
            </p>
          </div>

          <button
            onclick="handleOpenModal()"
            class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition flex items-center gap-2"
          >
            <i data-lucide="plus" class="w-5 h-5"></i>

            <span>Nuevo Producto</span>
          </button>

        </div>

        <!-- Tabla -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">

          <!-- Buscador -->
          <div class="relative mb-6">

            <i
              data-lucide="search"
              class="absolute left-3 top-1/2 transform -translate-y-1/2 w-5 h-5 text-gray-400"
            ></i>

            <input
              type="text"
              id="search-input"
              placeholder="Buscar productos..."
              class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
            />

          </div>

          <!-- Tabla -->
          <div class="overflow-x-auto">

            <table class="w-full">

              <thead>
                <tr class="border-b border-gray-200">

                  <th class="text-left py-3 px-4 text-sm font-medium text-gray-600">
                    SKU
                  </th>

                  <th class="text-left py-3 px-4 text-sm font-medium text-gray-600">
                    Producto
                  </th>

                  <th class="text-left py-3 px-4 text-sm font-medium text-gray-600">
                    Categoría
                  </th>

                  <th class="text-left py-3 px-4 text-sm font-medium text-gray-600">
                    Stock
                  </th>

                  <th class="text-left py-3 px-4 text-sm font-medium text-gray-600">
                    Precio
                  </th>

                  <th class="text-left py-3 px-4 text-sm font-medium text-gray-600">
                    Estado
                  </th>

                  <th class="text-left py-3 px-4 text-sm font-medium text-gray-600">
                    Última Modificación
                  </th>

                  <th class="text-right py-3 px-4 text-sm font-medium text-gray-600">
                    Acciones
                  </th>

                </tr>

              </thead>

              <tbody id="table-body"></tbody>

            </table>

              <div class="flex items-center justify-between mt-6">

                <button onclick="prevPage()" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg">
                  Anterior
                </button>

                <p id="pagination-info" class="text-sm text-gray-600">
                  Página 1
                </p>

                <button onclick="nextPage()" class="px-4 py-2 bg-blue-600 text-white hover:bg-blue-700 rounded-lg">
                  Siguiente
                </button>

              </div>

          </div>
        </div>

      </div>
    </main>

  </div>

  <!-- Modal -->
  <div
    id="product-modal"
    class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4"
  >

    <div class="bg-white rounded-xl shadow-xl max-w-md w-full p-6">

      <h2
        id="modal-title"
        class="text-2xl font-semibold text-gray-900 mb-6"
      >
        Nuevo Producto
      </h2>

      <form id="product-form" class="space-y-4">

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            Nombre
          </label>

          <input
            type="text"
            id="form-name"
            required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            SKU
          </label>

          <input
            type="text"
            id="form-sku"
            required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Categoría</label>
          <input type="text" id="form-category" required class="w-full px-4 py-2 border border-gray-300 rounded-lg" />
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Stock</label>
            <input type="number" id="form-stock" required class="w-full px-4 py-2 border border-gray-300 rounded-lg" />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Stock mínimo</label>
            <input type="number" id="form-minStock" required class="w-full px-4 py-2 border border-gray-300 rounded-lg" />
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Precio</label>
          <input type="number" step="0.01" id="form-price" required class="w-full px-4 py-2 border border-gray-300 rounded-lg" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Nodo</label>
          <select id="form-node" disabled class="w-full px-4 py-2 border border-gray-300 rounded-lg">
            <option value="Nodo PC1 - La Paz">Nodo PC1 - La Paz</option>
            <option value="Nodo PC2 - Réplica">Nodo PC2 - Réplica</option>
          </select>
        </div>

        <div class="flex gap-3 pt-4">

          <button
            type="button"
            onclick="handleCloseModal()"
            class="flex-1 px-4 py-2 border border-gray-300 rounded-lg"
          >
            Cancelar
          </button>

          <button
            type="submit"
            id="submit-btn"
            class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg"
          >
            Crear
          </button>

        </div>

      </form>
    </div>
  </div>
  
  <script src="assets/js/components.js?v=5"></script>
  <script src="config/rutas_config.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/script_inventario.js"></script>
 
</body>
</html>
