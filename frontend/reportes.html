<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Reportes - Sistema de Inventario</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
</head>

<body class="bg-gray-50 min-h-screen">

  <div class="flex min-h-screen">

    <!-- sidebar -->    
    <div id="sidebar-container"></div>

    <!-- CONTENIDO -->
    <main class="flex-1">

      <div class="p-4 lg:p-8 max-w-7xl mx-auto space-y-6">

        <!-- Encabezado -->
        <div class="flex items-center justify-between">

          <div>
            <h1 class="text-3xl font-medium text-gray-900 mb-2">
              Reportes
            </h1>

            <p class="text-gray-600">
              Análisis y estadísticas del inventario
            </p>
          </div>

          <div class="flex space-x-4 justify-center">
            <button onclick="descargarReporte('pdf')" class="bg-slate-800 text-white px-8 py-3 rounded-2xl font-bold hover:bg-slate-700 transition flex items-center shadow-lg shadow-slate-200">
              Descargar PDF
            </button>
          </div>
          
        </div>

        <!-- KPIs -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

          <!-- Ventas -->
          <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">

            <div class="flex items-center justify-between mb-2">
              <span class="text-sm font-medium text-gray-600">
                Ventas del Mes
              </span>

              <i data-lucide="trending-up" class="w-5 h-5 text-green-600"></i>
            </div>

            <p class="text-3xl font-semibold text-gray-900 mb-1">
              $67,000
            </p>

            <p class="text-sm font-medium text-green-600">
              +18% vs mes anterior
            </p>

          </div>

          <!-- Productos -->
          <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">

            <div class="flex items-center justify-between mb-2">
              <span class="text-sm font-medium text-gray-600">
                Productos Vendidos
              </span>

              <i data-lucide="package" class="w-5 h-5 text-blue-600"></i>
            </div>

            <p class="text-3xl font-semibold text-gray-900 mb-1">
              390
            </p>

            <p class="text-sm font-medium text-blue-600">
              +12% vs mes anterior
            </p>

          </div>

          <!-- Margen -->
          <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">

            <div class="flex items-center justify-between mb-2">
              <span class="text-sm font-medium text-gray-600">
                Margen de Ganancia
              </span>

              <i data-lucide="dollar-sign" class="w-5 h-5 text-purple-600"></i>
            </div>

            <p class="text-3xl font-semibold text-gray-900 mb-1">
              38.5%
            </p>

            <p class="text-sm font-medium text-purple-600">
              +2.3% vs mes anterior
            </p>

          </div>

        </div>

        <!-- Gráficas -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

          <!-- Barras -->
          <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">

            <h2 class="text-xl font-medium text-gray-900 mb-6">
              Ventas vs Compras
            </h2>

            <div class="relative w-full h-72">
              <canvas id="barChart"></canvas>
            </div>

          </div>

          <!-- Pastel -->
          <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">

            <h2 class="text-xl font-medium text-gray-900 mb-6">
              Distribución por Categoría
            </h2>

            <div class="relative w-full h-72 flex justify-center">
              <canvas id="pieChart"></canvas>
            </div>

          </div>

          <!-- Línea -->
          <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">

            <h2 class="text-xl font-medium text-gray-900 mb-6">
              Tendencia de Inventario
            </h2>

            <div class="relative w-full h-72">
              <canvas id="lineChart"></canvas>
            </div>

          </div>

          <!-- Productos -->
          <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">

            <h2 class="text-xl font-medium text-gray-900 mb-6">
              Productos Más Vendidos
            </h2>

            <div id="top-products-list" class="space-y-4"></div>

          </div>

        </div>

      </div>

    </main>

  </div>

  <script>
    async function descargarReporte(tipo) {
      try {
        const res = await fetch(CONFIG.API_PRODUCTOS);

        if (!res.ok) {
          throw new Error("No se pudieron obtener los productos");
        }

        const productos = await res.json();

        if (tipo === "pdf") {
          const { jsPDF } = window.jspdf;
          const doc = new jsPDF();

          const fecha = new Date().toLocaleString();

          // Encabezado
          doc.setFillColor(15, 23, 42);
          doc.rect(0, 0, 210, 35, "F");

          doc.setTextColor(255, 255, 255);
          doc.setFontSize(20);
          doc.setFont("helvetica", "bold");
          doc.text("Reporte de Inventario", 14, 18);

          doc.setFontSize(10);
          doc.setFont("helvetica", "normal");
          doc.text(`Sistema Ironclad | Generado: ${fecha}`, 14, 27);

          // Resumen
          const totalProductos = productos.length;
          const stockTotal = productos.reduce((acc, p) => acc + Number(p.stock || 0), 0);
          const stockBajo = productos.filter(p => Number(p.stock || 0) <= 10).length;

          doc.setTextColor(30, 41, 59);
          doc.setFontSize(12);
          doc.setFont("helvetica", "bold");
          doc.text("Resumen general", 14, 48);

          doc.setFont("helvetica", "normal");
          doc.text(`Total de productos: ${totalProductos}`, 14, 58);
          doc.text(`Stock total: ${stockTotal} unidades`, 14, 66);
          doc.text(`Productos con stock bajo: ${stockBajo}`, 14, 74);

          const tableData = productos.map((p, index) => [
            index + 1,
            p.nombre || "Sin nombre",
            p.categoria || "Sin categoría",
            p.stock || 0,
            p.nodo || "N/A",
            p.estado || "Activo"
          ]);

          doc.autoTable({
            head: [["#", "Producto", "Categoría", "Stock", "Nodo", "Estado"]],
            body: tableData,
            startY: 85,
            theme: "grid",
            headStyles: {
              fillColor: [15, 23, 42],
              textColor: [255, 255, 255],
              fontStyle: "bold"
            },
            styles: {
              font: "helvetica",
              fontSize: 9,
              cellPadding: 3
            },
            alternateRowStyles: {
              fillColor: [248, 250, 252]
            },
            columnStyles: {
              0: { halign: "center", cellWidth: 12 },
              3: { halign: "center" }
            }
          });

          doc.save("Reporte_Inventario_Ironclad.pdf");

        } else {
          let csv = "Producto,Categoria,Stock,Nodo,Estado\n";

          productos.forEach(p => {
            csv += `"${p.nombre || ""}","${p.categoria || ""}","${p.stock || 0}","${p.nodo || ""}","${p.estado || ""}"\n`;
          });

          const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
          const link = document.createElement("a");

          link.href = URL.createObjectURL(blob);
          link.download = "Inventario_Ironclad.csv";
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
        }

      } catch (error) {
        console.error(error);
        alert("Error al generar el reporte. Verifica la conexión con el servidor.");
      }
    }


    // 1. Inicializar iconos de Lucide
    lucide.createIcons();

    // 2. Datos (Traducción de tus arrays de React)
    const salesData = [
      { month: 'Ene', ventas: 45000, compras: 32000 },
      { month: 'Feb', ventas: 52000, compras: 28000 },
      { month: 'Mar', ventas: 48000, compras: 35000 },
      { month: 'Abr', ventas: 61000, compras: 42000 },
      { month: 'May', ventas: 55000, compras: 38000 },
      { month: 'Jun', ventas: 67000, compras: 45000 },
    ];

    const categoryData = [
      { name: 'Computadoras', value: 35, color: '#3b82f6' },
      { name: 'Periféricos', value: 25, color: '#10b981' },
      { name: 'Monitores', value: 20, color: '#f59e0b' },
      { name: 'Audio', value: 12, color: '#8b5cf6' },
      { name: 'Accesorios', value: 8, color: '#ef4444' },
    ];

    const inventoryTrend = [
      { week: 'Sem 1', stock: 1200 },
      { week: 'Sem 2', stock: 1150 },
      { week: 'Sem 3', stock: 1300 },
      { week: 'Sem 4', stock: 1234 },
    ];

    const topProducts = [
      { name: 'Laptop Dell XPS 15', sales: 45, revenue: 58499 },
      { name: 'Mouse Logitech MX', sales: 120, revenue: 11999 },
      { name: 'Teclado Mecánico', sales: 85, revenue: 12749 },
      { name: 'Monitor Samsung 27"', sales: 62, revenue: 18599 },
      { name: 'Auriculares Sony', sales: 78, revenue: 27299 },
    ];

    // 3. Renderizar Lista de Productos Más Vendidos
    const productsContainer = document.getElementById('top-products-list');
    topProducts.forEach((product, index) => {
      const html = `
        <div class="flex items-center gap-4">
          <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center font-semibold text-blue-600">
            ${index + 1}
          </div>
          <div class="flex-1">
            <p class="text-sm font-medium text-gray-900">${product.name}</p>
            <p class="text-xs text-gray-500">${product.sales} unidades vendidas</p>
          </div>
          <div class="text-right">
            <p class="text-sm font-medium text-gray-900">$${product.revenue.toLocaleString()}</p>
          </div>
        </div>
      `;
      productsContainer.insertAdjacentHTML('beforeend', html);
    });

    // 4. Configuración Global de Chart.js
    Chart.defaults.font.family = "ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif";
    Chart.defaults.color = "#6b7280";

    // 5. Crear Gráfica de Barras (Ventas vs Compras)
    new Chart(document.getElementById('barChart'), {
      type: 'bar',
      data: {
        labels: salesData.map(d => d.month),
        datasets: [
          {
            label: 'Ventas',
            data: salesData.map(d => d.ventas),
            backgroundColor: '#3b82f6',
            borderRadius: { topLeft: 4, topRight: 4, bottomLeft: 0, bottomRight: 0 }
          },
          {
            label: 'Compras',
            data: salesData.map(d => d.compras),
            backgroundColor: '#10b981',
            borderRadius: { topLeft: 4, topRight: 4, bottomLeft: 0, bottomRight: 0 }
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { position: 'bottom' }
        },
        scales: {
          y: { grid: { borderDash: [3, 3], color: '#e5e7eb' }, beginAtZero: true },
          x: { grid: { display: false } }
        }
      }
    });

    // 6. Crear Gráfica de Pastel (Categorías)
    new Chart(document.getElementById('pieChart'), {
      type: 'pie',
      data: {
        labels: categoryData.map(d => d.name),
        datasets: [{
          data: categoryData.map(d => d.value),
          backgroundColor: categoryData.map(d => d.color),
          borderWidth: 1
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { position: 'right' },
          tooltip: {
            callbacks: {
              label: function(context) {
                return ` ${context.label}: ${context.raw}%`;
              }
            }
          }
        }
      }
    });

    // 7. Crear Gráfica de Líneas (Tendencia)
    new Chart(document.getElementById('lineChart'), {
      type: 'line',
      data: {
        labels: inventoryTrend.map(d => d.week),
        datasets: [{
          label: 'Stock Total',
          data: inventoryTrend.map(d => d.stock),
          borderColor: '#8b5cf6',
          backgroundColor: '#8b5cf6',
          borderWidth: 3,
          pointRadius: 5,
          pointBackgroundColor: '#8b5cf6',
          tension: 0.4 // Para emular el type="monotone" de Recharts
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { position: 'bottom' }
        },
        scales: {
          y: { grid: { borderDash: [3, 3], color: '#e5e7eb' }, min: 1000 },
          x: { grid: { display: false } }
        }
      }
    });
  </script>

</body>

<script src="config/rutas_config.js"></script>
<script src="assets/js/script.js"></script>
<script src="assets/js/components.js?v=5"></script>
<script src="assets/js/auth.js"></script>
</html>
